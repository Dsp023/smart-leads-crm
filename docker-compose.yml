version: '3.8'

services:
  # ==========================================
  # Database Service: MongoDB
  # ==========================================
  mongo:
    image: mongo:latest
    container_name: smart_leads_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  # ==========================================
  # Backend Service: Express API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_leads_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/smart_leads
      - JWT_SECRET=super_secret_key_for_smart_leads_dashboard_internship_2026
    depends_on:
      - mongo
    restart: always

  # ==========================================
  # Frontend Service: Nginx + React
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_leads_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
